<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>❤️ 给你的一封信 ❤️</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #FFE4E1;
            font-family: 'Microsoft YaHei', sans-serif;
            overflow: hidden;
        }
        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            z-index: 10;
        }
        h1 { color: #FF1493; }
        .buttons { margin-top: 30px; position: relative; height: 50px; }
        button {
            padding: 10px 25px;
            font-size: 18px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            transition: all 0.3s;
        }
        #yes { background-color: #FF69B4; color: white; margin-right: 20px; }
        #no {
            background-color: #CCCCCC; color: #666;
            position: absolute;
        }
        /* 弹窗样式 */
        .message-box {
            position: fixed;
            padding: 15px 25px;
            background: #FFB6C1;
            color: #8B0000;
            font-weight: bold;
            border-radius: 10px;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.2);
            z-index: 100;
            animation: pop 0.5s ease-out;
        }
        @keyframes pop {
            0% { transform: scale(0); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="container" id="main">
        <h1>可以成为我的恋人吗？ ❤️</h1>
        <div class="buttons">
            <button id="yes">可以 ❤️</button>
            <button id="no">不可以</button>
        </div>
    </div>

    <script>
        const messages = [
            "我想你了! ❤️", "多喝水哦", "保持微笑呀", "每天都要元气慢慢呢",
            "记得吃水果", "保持好心情", "好好爱自己", "梦想成真",
            "遇见你是我最大的幸运!", "我会一直陪在你身边的! 🌟"
        ];

        const noBtn = document.getElementById('no');
        const yesBtn = document.getElementById('yes');

        // 1. 实现“不可以”按钮躲避逻辑
        noBtn.onmouseover = moveButton;
        noBtn.ontouchstart = moveButton; // 适配手机端

        function moveButton() {
            const x = Math.random() * (window.innerWidth - 100);
            const y = Math.random() * (window.innerHeight - 50);
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';
        }

        // 2. 实现点击“可以”后的弹窗效果
        yesBtn.onclick = function() {
            document.getElementById('main').style.display = 'none';
            
            // 快速生成弹窗
            let count = 0;
            const interval = setInterval(() => {
                createMessage();
                count++;
                if (count > 50) clearInterval(interval);
            }, 150);
        };

        function createMessage() {
            const div = document.createElement('div');
            div.className = 'message-box';
            div.innerText = messages[Math.floor(Math.random() * messages.length)];
            
            const x = Math.random() * (window.innerWidth - 200);
            const y = Math.random() * (window.innerHeight - 100);
            
            div.style.left = x + 'px';
            div.style.top = y + 'px';
            div.style.backgroundColor = `hsl(${Math.random() * 360}, 100%, 85%)`;
            
            document.body.appendChild(div);
        }
    </script>
</body>
</html>
