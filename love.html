<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>❤️ 专属浪漫提示 ❤️</title>
    <style>
        /* 彻底禁止选中，防止“抓住”按钮 */
        * {
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #FFE4E1;
            font-family: '楷体', 'STKaiti', serif;
            overflow: hidden;
            touch-action: none;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            padding: 30px 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            z-index: 10;
            width: 80%;
            max-width: 300px;
        }

        h1 { color: #FF1493; font-size: 1.3rem; margin-bottom: 25px; }

        .btn-frame {
            display: flex;
            justify-content: space-around;
            align-items: center;
            height: 80px;
            position: relative;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            outline: none;
        }

        #yes-btn { background-color: #FF69B4; color: white; font-weight: bold; }

        #no-btn {
            background-color: #CCCCCC;
            color: #666;
            position: absolute; /* 初始位置 */
            z-index: 1000;
            transition: all 0.1s ease;
        }

        .message-box {
            position: fixed;
            padding: 8px 15px;
            color: #8B0000;
            font-size: 14px;
            font-weight: bold;
            border-radius: 30px;
            box-shadow: 2px 2px 8px rgba(0,0,0,0.1);
            z-index: 100;
            white-space: nowrap;
            animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
        }

        @keyframes pop {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="container" id="main-ui">
        <h1>可以成为我的恋人吗？ ❤️</h1>
        <div class="btn-frame">
            <button id="yes-btn">可以 ❤️</button>
            <button id="no-btn">不可以</button>
        </div>
    </div>

    <script>
        const messages = ["我想你了! ❤️", "保持微笑呀", "元气满满", "记得吃水果", "保持好心情", "好好爱自己", "梦想成真", "我好喜欢你呀! 💕", "你超棒的", "珍惜每一刻", "想我了吗？", "遇见你是幸运", "一直陪着你! 🌟"];
        const colors = ['#FFB6C1', '#FF69B4', '#FFC0CB', '#FFA07A', '#E6E6FA', '#DDA0DD'];

        const noBtn = document.getElementById('no-btn');
        const yesBtn = document.getElementById('yes-btn');
        const mainUI = document.getElementById('main-ui');

        // --- 核心修复：绝对不会跳出屏幕的“不可以” ---
        function moveNoButton() {
            // 设置为 fixed 以便在整个视口移动
            noBtn.style.position = 'fixed';
            
            // 安全边距：防止贴边看不见
            const padding = 30;
            
            // 可移动的有效宽度 = 屏幕宽度 - 按钮本身宽度 - 左右边距
            const maxX = window.innerWidth - noBtn.offsetWidth - padding;
            // 可移动的有效高度 = 屏幕高度 - 按钮本身高度 - 上下边距
            const maxY = window.innerHeight - noBtn.offsetHeight - padding;

            // 确保坐标在 [padding, maxX] 之间，绝对不会变成负数或超出范围
            const randomX = Math.max(padding, Math.random() * maxX);
            const randomY = Math.max(padding, Math.random() * maxY);

            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
        }

        // 针对手机触摸和鼠标移入
        noBtn.addEventListener('touchstart', (e) => { e.preventDefault(); moveNoButton(); });
        noBtn.addEventListener('mouseenter', moveNoButton);
        noBtn.onclick = (e) => { e.preventDefault(); moveNoButton(); };

        // --- 核心修复：保持爱心形状不走样 ---
        yesBtn.onclick = function() {
            mainUI.style.display = 'none';
            createHeartEffect();
            // 延长总运行时间，先画轮廓，再慢慢填充内部
            setTimeout(fillHeartInterior, 3500);
        };

        let centerX, centerY, heartSize;

        function createHeartEffect() {
            centerX = window.innerWidth / 2;
            centerY = window.innerHeight / 2;
            // 自动适配手机大小，爱心占屏幕约 1/3
            heartSize = Math.min(window.innerWidth, window.innerHeight) / 35;

            const numWindows = 60; // 轮廓粒子

            for (let i = 0; i < numWindows; i++) {
                setTimeout(() => {
                    const t = (2 * Math.PI * i) / numWindows;
                    const x = 16 * Math.pow(Math.sin(t), 3);
                    const y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
                    
                    // 修正粒子位置，使其完美围绕中心
                    spawnPopup(centerX + x * heartSize - 40, centerY - y * heartSize - 20);
                }, i * 100);
            }
        }

        // 核心优化：只在爱心内部随机生成
        function fillHeartInterior() {
            let count = 0;
            const maxFill = 40; 
            const interval = setInterval(() => {
                // 生成一个在爱心包络圆内的点
                const angle = Math.random() * Math.PI * 2;
                const radius = Math.random() * 0.8; // 0.8 倍半径确保不超出轮廓
                
                const t = angle;
                const bx = 16 * Math.pow(Math.sin(t), 3);
                const by = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
                
                // 最终位置 = 中心点 + 边界点 * 随机半径
                const px = centerX + (bx * heartSize * radius) - 40;
                const py = centerY - (by * heartSize * radius) - 20;

                spawnPopup(px, py);
                count++;
                if (count >= maxFill) clearInterval(interval);
            }, 200);
        }

        function spawnPopup(x, y) {
            const div = document.createElement('div');
            div.className = 'message-box';
            div.innerText = messages[Math.floor(Math.random() * messages.length)];
            div.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            div.style.left = x + 'px';
            div.style.top = y + 'px';
            document.body.appendChild(div);
        }
    </script>
</body>
</html>
