<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>❤️ 重要的问题 ❤️</title>
    <style>
        /* 禁止全屏选中文本，防止对方通过长按选中“不可以” */
        * {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #FFE4E1;
            font-family: '楷体', 'STKaiti', serif;
            overflow: hidden;
            touch-action: none;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.9);
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            z-index: 10;
            width: 85%;
            max-width: 350px;
        }

        h1 { 
            color: #FF1493; 
            font-size: 24px; 
            margin-bottom: 30px; 
        }

        .btn-frame {
            display: flex;
            justify-content: space-around;
            align-items: center;
            height: 100px;
            position: relative;
        }

        button {
            padding: 10px 20px;
            font-size: 18px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            outline: none;
        }

        #yes-btn {
            background-color: #FF69B4;
            color: white;
            font-weight: bold;
        }

        #no-btn {
            background-color: #CCCCCC;
            color: #666666;
            position: absolute;
            transition: all 0.15s ease;
            /* 确保按钮不会被点击触发任何事件 */
            pointer-events: auto;
        }

        .message-box {
            position: fixed;
            padding: 12px 22px;
            color: #8B0000;
            font-size: 16px;
            font-weight: bold;
            border-radius: 10px;
            box-shadow: 2px 2px 8px rgba(0,0,0,0.2);
            z-index: 100;
            white-space: nowrap;
            animation: pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes pop {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .hint { color: #888888; font-size: 14px; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="container" id="main-ui">
        <h1>可以成为我的恋人吗？</h1>
        <div class="btn-frame">
            <button id="yes-btn">可以 ❤️</button>
            <button id="no-btn">不可以</button>
        </div>
        <div class="hint">提示：试着点击'可以'按钮哦~</div>
    </div>

    <script>
        const messages = [
            "我想你了! ❤️", "多喝水哦", "保持微笑呀", "每天都要元气慢慢呢",
            "记得吃水果", "保持好心情", "好好爱自己", "梦想成真",
            "期待下一次见面", "要相信自己", "我好喜欢你呀! 💕", "你超棒的",
            "记得好好护肤", "你笑起来真好看!", "珍惜每一刻", "今天有没有想我呀?",
            "要注意身体，别太累了!", "你的一切都让我心动!", 
            "遇见你是我最大的幸运!", "我会一直陪在你身边的! 🌟"
        ];

        const colors = [
            '#FFB6C1', '#FF69B4', '#FF1493', '#DB7093', '#FFC0CB',
            '#FFA07A', '#FF7F50', '#FF6347', '#FFA500', '#FFD700',
            '#FFFACD', '#F0E68C', '#E6E6FA', '#D8BFD8', '#DDA0DD',
            '#EE82EE', '#DA70D6', '#BA55D3'
        ];

        const noBtn = document.getElementById('no-btn');
        const yesBtn = document.getElementById('yes-btn');
        const mainUI = document.getElementById('main-ui');

        // --- 逻辑1：强化“不可以”躲避 ---
        function moveNoButton(e) {
            // 计算随机位置，确保不超出屏幕
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth - 40) + 20;
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight - 40) + 20;
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';
            noBtn.style.position = 'fixed';
        }

        // 鼠标移入即跑
        noBtn.addEventListener('mouseenter', moveNoButton);
        // 手机点击/触摸即跑
        noBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            moveNoButton();
        });
        // 增加点击防御，防止万一被点到
        noBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            moveNoButton();
        });

        // --- 逻辑2：延长运行时间的生成逻辑 ---
        yesBtn.onclick = function() {
            mainUI.style.display = 'none';
            
            // 阶段1：缓慢拼凑爱心 (延长拼凑感)
            createHeartEffect();
            
            // 阶段2：两秒后开始长时间随机弹窗
            setTimeout(() => {
                continuousRandomWindows();
            }, 2500);
        };

        function createHeartEffect() {
            const numWindows = 80; // 增加爱心粒子数量
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2 - 50;
            const size = window.innerWidth < 500 ? 12 : 20;

            for (let i = 0; i < numWindows; i++) {
                // 将间隔稍微拉长一点，让爱心一点点出现
                setTimeout(() => {
                    const t = (2 * Math.PI * i) / numWindows;
                    let x = 16 * Math.pow(Math.sin(t), 3);
                    let y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - math.cos(4*t);
                    // 修正 JS 中的 math 为 Math
                    y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
                    
                    const posX = centerX + x * size;
                    const posY = centerY - y * size;
                    spawnPopup(posX, posY);
                }, i * 100); // 0.1秒出一个
            }
        }

        function continuousRandomWindows() {
            let count = 0;
            const maxCount = 50; // 增加到50个弹窗，延长运行时间
            const interval = setInterval(() => {
                const posX = Math.random() * (window.innerWidth - 180);
                const posY = Math.random() * (window.innerHeight - 80);
                spawnPopup(posX, posY);
                count++;
                if (count >= maxCount) clearInterval(interval);
            }, 150); // 间隔稍微拉长，更有节奏感
        }

        function spawnPopup(x, y) {
            const div = document.createElement('div');
            div.className = 'message-box';
            div.innerText = messages[Math.floor(Math.random() * messages.length)];
            div.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            div.style.left = x + 'px';
            div.style.top = y + 'px';
            document.body.appendChild(div);
        }
    </script>
</body>
</html>
