<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>❤️ 专属浪漫提示 ❤️</title>
    <style>
        /* 核心防御：禁止全屏选中，让“不可以”无法被抓住 */
        * {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            -webkit-touch-callout: none; /* 禁用系统长按菜单 */
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #FFE4E1;
            font-family: '楷体', 'STKaiti', serif;
            overflow: hidden;
            touch-action: none;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.9);
            padding: 40px 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            z-index: 10;
            width: 80%;
            max-width: 350px;
        }

        h1 { color: #FF1493; font-size: 22px; margin-bottom: 30px; }

        .btn-frame {
            display: flex;
            justify-content: space-around;
            align-items: center;
            height: 100px;
            position: relative;
        }

        button {
            padding: 12px 25px;
            font-size: 18px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            outline: none;
        }

        #yes-btn {
            background-color: #FF69B4;
            color: white;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(255, 105, 180, 0.3);
        }

        #no-btn {
            background-color: #CCCCCC;
            color: #666666;
            position: absolute; /* 初始相对定位，JS触发后变为fixed */
            transition: all 0.15s ease;
            z-index: 1000;
        }

        /* 弹窗样式 */
        .message-box {
            position: fixed;
            padding: 12px 20px;
            color: #8B0000;
            font-size: 16px;
            font-weight: bold;
            border-radius: 12px;
            box-shadow: 2px 2px 12px rgba(0,0,0,0.15);
            z-index: 100;
            white-space: nowrap;
            animation: pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none; /* 弹窗不遮挡点击 */
        }

        @keyframes pop {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .hint { color: #aaa; font-size: 12px; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="container" id="main-ui">
        <h1>可以成为我的恋人吗？ ❤️</h1>
        <div class="btn-frame">
            <button id="yes-btn">可以 ❤️</button>
            <button id="no-btn">不可以</button>
        </div>
        <div class="hint">提示：一定要真心回答哦~</div>
    </div>

    <script>
        const messages = [
            "我想你了! ❤️", "多喝水哦", "保持微笑呀", "每天都要元气慢慢呢",
            "记得吃水果", "保持好心情", "好好爱自己", "梦想成真",
            "期待下一次见面", "要相信自己", "我好喜欢你呀! 💕", "你超棒的",
            "记得好好护肤", "你笑起来真好看!", "珍惜每一刻", "今天有没有想我呀?",
            "要注意身体，别太累了!", "你的一切都让我心动!", 
            "遇见你是我最大的幸运!", "我会一直陪在你身边的! 🌟"
        ];

        const colors = ['#FFB6C1', '#FF69B4', '#FF1493', '#DB7093', '#FFC0CB', '#FFA07A', '#FF7F50', '#FF6347', '#E6E6FA', '#DDA0DD'];

        const noBtn = document.getElementById('no-btn');
        const yesBtn = document.getElementById('yes-btn');
        const mainUI = document.getElementById('main-ui');

        // --- 1. 躲避算法：让按钮随手飘走 ---
        function moveNoButton() {
            // 强制 fixed 定位，使其能在全屏范围内自由移动
            noBtn.style.position = 'fixed';
            
            // 计算随机位置，预留边距防止跳出屏幕
            const padding = 20;
            const maxWidth = window.innerWidth - noBtn.offsetWidth - padding;
            const maxHeight = window.innerHeight - noBtn.offsetHeight - padding;
            
            const randomX = Math.random() * maxWidth + padding/2;
            const randomY = Math.random() * maxHeight + padding/2;

            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
            
            // 增加一点随机旋转，看起来更灵动
            const angle = (Math.random() - 0.5) * 30;
            noBtn.style.transform = `rotate(${angle}deg)`;
        }

        // 兼容电脑鼠标和手机触摸
        noBtn.addEventListener('mouseenter', moveNoButton);
        noBtn.addEventListener('touchstart', (e) => {
            e.preventDefault(); // 阻止手机长按和点击默认行为
            moveNoButton();
        });
        noBtn.onclick = (e) => {
            e.preventDefault();
            moveNoButton();
        };

        // --- 2. 浪漫生成效果 ---
        yesBtn.onclick = function() {
            mainUI.style.display = 'none';
            
            // 第一步：绘制爱心 (耗时约 8-10 秒)
            createHeartEffect();
            
            // 第二步：延迟后开启持续随机弹窗 (再运行 10 秒)
            setTimeout(() => {
                continuousRandomWindows();
            }, 2500);
        };

        function createHeartEffect() {
            const numWindows = 80; 
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2 - 50;
            // 根据屏幕宽度自动调整爱心大小
            const size = window.innerWidth < 500 ? 12 : 22;

            for (let i = 0; i < numWindows; i++) {
                setTimeout(() => {
                    const t = (2 * Math.PI * i) / numWindows;
                    // 复刻 Python 中的爱心坐标方程
                    const x = 16 * Math.pow(Math.sin(t), 3);
                    const y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
                    
                    const posX = centerX + x * size;
                    const posY = centerY - y * size;
                    spawnPopup(posX, posY);
                }, i * 120); // 间隔设为0.12秒，绘制过程更优雅
            }
        }

        function continuousRandomWindows() {
            let count = 0;
            const maxCount = 60; // 弹窗总数
            const interval = setInterval(() => {
                const posX = Math.random() * (window.innerWidth - 180);
                const posY = Math.random() * (window.innerHeight - 80);
                spawnPopup(posX, posY);
                count++;
                if (count >= maxCount) clearInterval(interval);
            }, 180); // 每0.18秒出一个，持续约10秒
        }

        function spawnPopup(x, y) {
            const div = document.createElement('div');
            div.className = 'message-box';
            div.innerText = messages[Math.floor(Math.random() * messages.length)];
            div.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            div.style.left = x + 'px';
            div.style.top = y + 'px';
            document.body.appendChild(div);
        }
    </script>
</body>
</html>
